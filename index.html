<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ME-WAR | 中东战事实时追踪</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --text-primary: #e8e8e8;
            --text-secondary: #888899;
            --accent-red: #ff4444;
            --accent-orange: #ff8844;
            --accent-blue: #4488ff;
            --border-color: #2a2a3a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent-red);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #44ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .last-update {
            color: var(--text-secondary);
        }

        /* Main Layout */
        main {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* Map Section */
        #map {
            flex: 1;
            min-width: 0;
        }

        /* News Section */
        .news-panel {
            width: 420px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .news-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-title {
            font-size: 16px;
            font-weight: 600;
        }

        .refresh-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .news-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .news-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .news-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent-blue);
        }

        .news-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .news-item {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .news-item:hover {
            border-color: var(--border-color);
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .news-source {
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .news-source.bbc { color: #bb1919; }
        .news-source.aljazeera { color: #cc3333; }
        .news-source.reuters { color: #ff8000; }
        .news-source.cctv { color: #e60000; }
        .news-source.xinhua { color: #dd3333; }
        .news-source.twitter { color: #1da1f2; }

        .news-time {
            color: var(--text-secondary);
        }

        .news-headline {
            font-size: 14px;
            line-height: 1.5;
            font-weight: 500;
        }

        .news-summary {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.4;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Map Markers */
        .strike-marker {
            background: var(--accent-red);
            border: 2px solid #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
        }

        .custom-popup .leaflet-popup-content-wrapper {
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 8px;
        }

        .custom-popup .leaflet-popup-tip {
            background: var(--bg-card);
        }

        .popup-content {
            min-width: 200px;
        }

        .popup-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--accent-red);
        }

        .popup-info {
            font-size: 12px;
            line-height: 1.6;
        }

        .popup-info strong {
            color: var(--text-secondary);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 900px) {
            main {
                flex-direction: column;
            }
            #map {
                height: 50vh;
            }
            .news-panel {
                width: 100%;
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">ME<span>-WAR</span></div>
        <div class="status">
            <div class="status-dot"></div>
            <span>实时追踪</span>
            <span class="last-update" id="lastUpdate">--</span>
        </div>
    </header>

    <main>
        <div id="map"></div>
        
        <div class="news-panel">
            <div class="news-header">
                <div class="news-title">📰 战况新闻</div>
                <button class="refresh-btn" onclick="refreshNews()">🔄 刷新</button>
            </div>
            <div class="news-tabs">
                <div class="news-tab active" data-lang="all" onclick="switchTab('all')">全部</div>
                <div class="news-tab" data-lang="en" onclick="switchTab('en')">English</div>
                <div class="news-tab" data-lang="zh" onclick="switchTab('zh')">中文</div>
            </div>
            <div class="news-list" id="newsList">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ========== CONFIG ==========
        const CONFIG = {
            refreshInterval: 5 * 60 * 1000, // 5 minutes
            newsSources: {
                en: [
                    { name: 'BBC', url: 'https://feeds.bbci.co.uk/news/world/middle_east/rss.xml' },
                    { name: 'Reuters', url: 'https://www.reutersagency.com/feed/?best-regions=middle-east' },
                    { name: 'Al Jazeera', url: 'https://www.aljazeera.com/xml/rss/all.xml' }
                ],
                zh: [
                    { name: '新华社', url: 'https://www.xinhuanet.com/world/news_middleeast.xml' },
                    { name: '央视新闻', url: 'https://news.cctv.com/world/rss.xml' }
                ]
            }
        };

        // ========== STATE ==========
        let map;
        let currentTab = 'all';
        let newsData = [];
        let strikesData = [
            // Initial strikes data based on today's events
            {
                id: 1,
                lat: 35.6892,
                lng: 51.3890,
                title: "德黑兰 (Tehran)",
                type: "空袭",
                time: "2026-02-28",
                description: "以色列对美国和以色列联合袭击伊朗首都",
                source: "Multiple"
            },
            {
                id: 2,
                lat: 32.4600,
                lng: 44.4261,
                title: "巴格达 (Baghdad)",
                type: "空袭",
                time: "2026-02-28",
                description: "伊拉克首都遭到的袭击（报告）",
                source: "Reuters"
            },
            {
                id: 3,
                lat: 33.3152,
                lng: 44.3661,
                title: "伊拉克",
                type: "空袭",
                time: "2026-02-28",
                description: "针对伊朗在伊拉克目标的袭击",
                source: "BBC"
            },
            {
                id: 4,
                lat: 26.0667,
                lng: 50.5577,
                title: "巴林 (Bahrain)",
                type: "军事部署",
                time: "2026-02-28",
                description: "美国海军第五舰队部署",
                source: "US Navy"
            },
            {
                id: 5,
                lat: 25.2854,
                lng: 51.5310,
                title: "卡塔尔 (Qatar)",
                type: "军事部署",
                time: "2026-02-28",
                description: "美国中央司令部前沿部署",
                source: "Pentagon"
            }
        ];

        // ========== MAP ==========
        function initMap() {
            map = L.map('map', {
                center: [30, 45],
                zoom: 5,
                zoomControl: true
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                maxZoom: 19
            }).addTo(map);

            // Add strike markers
            strikesData.forEach(strike => {
                addStrikeMarker(strike);
            });
        }

        function addStrikeMarker(strike) {
            const icon = L.divIcon({
                className: 'strike-marker',
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            const marker = L.marker([strike.lat, strike.lng], { icon }).addTo(map);

            const popupContent = `
                <div class="popup-content">
                    <div class="popup-title">⚠️ ${strike.title}</div>
                    <div class="popup-info">
                        <p><strong>类型:</strong> ${strike.type}</p>
                        <p><strong>时间:</strong> ${strike.time}</p>
                        <p><strong>描述:</strong> ${strike.description}</p>
                        <p><strong>来源:</strong> ${strike.source}</p>
                    </div>
                </div>
            `;

            marker.bindPopup(popupContent, {
                className: 'custom-popup',
                maxWidth: 300
            });
        }

        // ========== NEWS ==========
        async function fetchRSS(url, sourceName) {
            try {
                // Use RSS to JSON converter
                const rssUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
                const response = await fetch(rssUrl);
                const data = await response.json();
                
                if (data.status === 'ok' && data.items) {
                    return data.items.slice(0, 10).map(item => ({
                        title: item.title,
                        summary: item.description?.replace(/<[^>]*>/g, '').substring(0, 150) + '...',
                        link: item.link,
                        pubDate: item.pubDate,
                        source: sourceName,
                        lang: 'en'
                    }));
                }
            } catch (e) {
                console.error(`Failed to fetch ${sourceName}:`, e);
            }
            return [];
        }

        async function fetchXinhua() {
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.xinhuanet.com/world/news_middleeast.xml');
                const data = await response.json();
                
                if (data.status === 'ok' && data.items) {
                    return data.items.slice(0, 10).map(item => ({
                        title: item.title,
                        summary: item.description?.replace(/<[^>]*>/g, '').substring(0, 150) + '...',
                        link: item.link,
                        pubDate: item.pubDate,
                        source: '新华社',
                        lang: 'zh'
                    }));
                }
            } catch (e) {
                console.error('Failed to fetch Xinhua:', e);
            }
            return [];
        }

        async function fetchCCTV() {
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://news.cctv.com/world/rss.xml');
                const data = await response.json();
                
                if (data.status === 'ok' && data.items) {
                    return data.items.slice(0, 10).map(item => ({
                        title: item.title,
                        summary: item.description?.replace(/[^中]*/</?[^>]*>/g, '').substring(0, 150) + '...',
                        link: item.link,
                        pubDate: item.pubDate,
                        source: '央视新闻',
                        lang: 'zh'
                    }));
                }
            } catch (e) {
                console.error('Failed to fetch CCTV:', e);
            }
            return [];
        }

        async function refreshNews() {
            const newsList = document.getElementById('newsList');
            newsList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            const promises = [];
            
            // English sources
            CONFIG.newsSources.en.forEach(source => {
                promises.push(fetchRSS(source.url, source.name));
            });
            
            // Chinese sources
            promises.push(fetchXinhua());
            promises.push(fetchCCTV());

            const results = await Promise.all(promises);
            newsData = results.flat().filter(n => n && n.title);

            // Sort by date
            newsData.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

            // Update last update time
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            renderNews();
        }

        function renderNews() {
            const newsList = document.getElementById('newsList');
            const filtered = currentTab === 'all' 
                ? newsData 
                : newsData.filter(n => n.lang === currentTab);

            if (filtered.length === 0) {
                newsList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h6l2 2h6a2 2 0 012 2v10a2 2 0 01-2 2z"/>
                        </svg>
                        <p>暂无新闻</p>
                    </div>
                `;
                return;
            }

            newsList.innerHTML = filtered.map(news => {
                const sourceClass = news.source.toLowerCase().replace(/\s/g, '');
                const time = formatTime(news.pubDate);
                
                return `
                    <div class="news-item" onclick="window.open('${news.link}', '_blank')">
                        <div class="news-meta">
                            <span class="news-source ${sourceClass}">${news.source}</span>
                            <span class="news-time">${time}</span>
                        </div>
                        <div class="news-headline">${news.title}</div>
                        ${news.summary ? `<div class="news-summary">${news.summary}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.news-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.lang === tab);
            });
            renderNews();
        }

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;
            
            return date.toLocaleDateString('zh-CN');
        }

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            refreshNews();
            
            // Auto refresh
            setInterval(refreshNews, CONFIG.refreshInterval);
        });
    </script>
</body>
</html>
